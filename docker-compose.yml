services:
  homerwarden:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homerwarden
    user: 1000:1000
    environment:
      LINKWARDEN_API_URL: ${LINKWARDEN_API_URL:-https://linkwarden.example.com}
      LINKWARDEN_API_KEY: ${LINKWARDEN_API_KEY:-your-api-key}
      HOMER_MOUNT_PATH: /homer/assets/config
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-15}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-5000}
    volumes:
      - homer_config:/homer/assets/config
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    restart: unless-stopped

volumes:
  homer_config:
